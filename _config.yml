# Site settings
title: Beomdo
description: "Beomdo's blog"
url: "https://beomdo-park.github.io"

# Google Analytics
google_analytics: UA—XXXXXXXX-X

# Author
author:
  name: Beomdo
  url: https://github.com/beomdo-park
  email: pbdomdo@gmail.com

# Build settings
markdown: kramdown
include:
  - _pages

# Assets
sass:
  sass_dir: _sass
  style: compressed

# Gems
plugins:
  - jekyll-feed
  - jekyll-paginate
  - jekyll-seo-tag
  # - jemoji #Uncomment this to allow emoji in your post

# Permalinks
permalink: /:year-:month-:day/:title
paginate: 5

# Excludes
exclude: [Gemfile, Gemfile.lock, tale.gemspec]
# Disqus (Set to your disqus id)
# disqus: jekyll-tale
